name: Android CI (Build, Test & Sonar)
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
jobs:
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4
    - name: Configurar JDK 21 (Requerido para AGP 9.x)
      uses: actions/setup-java@v4
      with:
        java-version: '21' 
        distribution: 'temurin'
        cache: gradle
    - name: Inyectar google-services.json (Firebase)
      env:
        GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
      run: |
        if [ -n "$GOOGLE_SERVICES_JSON" ]; then
          echo $GOOGLE_SERVICES_JSON | base64 -d > app/google-services.json
        else
          echo "No se encontró el secreto GOOGLE_SERVICES_JSON_BASE64. Saltando paso."
        fi
    - name: Dar permisos a gradlew
      run: chmod +x ./gradlew
    - name: Ejecutar Tests Unitarios
      run: ./gradlew testDebugUnitTest
    - name: Compilar la aplicación (Debug APK)
      run: ./gradlew assembleDebug
    - name: Subir APK como artefacto
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
  # --- JOB DE SONAR CORREGIDO ---
  sonar:
    name: Sonar Analysis
    runs-on: ubuntu-latest
    # Forzamos a que termine el build primero
    needs: build-and-test 
    
    steps:
    - name: Checkout del código (Con historial completo)
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  
    - name: Configurar JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle
    - name: Inyectar google-services.json (Firebase)
      env:
        GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
      run: |
        if [ -n "$GOOGLE_SERVICES_JSON" ]; then
          echo $GOOGLE_SERVICES_JSON | base64 -d > app/google-services.json
        fi
    - name: Dar permisos a gradlew
      run: chmod +x ./gradlew
    # Separamos en dos líneas para asegurar que Kover recopile los tests ya ejecutados
    - name: Ejecutar Tests y Generar Reporte de Cobertura (JaCoCo)
      run: ./gradlew testDebugUnitTest jacocoTestReport
    - name: Verificar reporte JaCoCo
      run: |
        find . -path "*jacoco*" -name "*.xml" -exec ls -la {} \;
        find . -path "*jacoco*" -name "jacocoTestReport.xml" -exec grep -c "<class" {} \;
    - name: Diagnóstico JaCoCo
      run: |
        echo "=== .exec / .ec ==="
        find . -name "*.exec" 2>/dev/null
        find . -name "*.ec" 2>/dev/null
        echo "=== carpetas classes en app/build ==="
        find app/build -type d -name "*classes*" 2>/dev/null
        echo "=== kotlin-classes debug ==="
        ls -la app/build/tmp/kotlin-classes/debug/ 2>/dev/null || echo "NO existe esa carpeta"
    - name: Ejecutar análisis de Sonar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        ./gradlew sonar --info
